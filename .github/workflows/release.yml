name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure resources directory exists
        run: mkdir -p resources

      - name: Zip Plugin
        run: |
          # Use zip and ignore errors if some files are missing, but ensure metadata and plugins are included
          zip -r ViaStitching.zip plugins metadata.json resources/ || echo "Zip completed with some warnings"

      - name: Generate repository.json
        run: |
          # Extract version from tag (e.g., refs/tags/v1.0.0 -> 1.0.0)
          VERSION=$(echo ${GITHUB_REF#refs/tags/} | sed 's/^v//')
          echo "{
            \"plugins\": [
              {
                \"identifier\": \"com.github.jsreynaud.viastitching\",
                \"name\": \"ViaStitching\",
                \"version\": \"$VERSION\",
                \"download_url\": \"https://github.com/${{ github.repository }}/releases/download/v$VERSION/ViaStitching.zip\"
              }
            ]
          }" > repository.json

      - name: Create Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release if it exists to avoid "release already exists" error
          gh release delete ${{ github.ref_name }} --yes || true
          
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --body "Automated release for version ${{ github.ref_name }}. Fixed KiCAD 10 compatibility and translated interface to Chinese." \
            ViaStitching.zip repository.json
