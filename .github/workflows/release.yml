name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure directories exist
        run: mkdir -p resources

      - name: Zip Plugin
        run: |
          zip -r ViaStitching.zip plugins metadata.json resources || true

      - name: Generate repository.json from template
        run: |
          VERSION=$(echo ${GITHUB_REF#refs/tags/} | sed 's/^v//')
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION/ViaStitching.zip"
          sed -e "s/{{VERSION}}/$VERSION/g" -e "s|{{DOWNLOAD_URL}}|$DOWNLOAD_URL|g" repository.json.template > repository.json

      - name: Create Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ github.ref_name }} --yes || true
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release for version ${{ github.ref_name }}. Fixed KiCAD 10 compatibility and translated interface to Chinese." \
            ViaStitching.zip repository.json
