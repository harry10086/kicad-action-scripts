name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug File Structure
        run: |
          echo "Checking current directory contents:"
          ls -R
          echo "Checking GITHUB_REF: $GITHUB_REF"

      - name: Ensure resources directory exists
        run: mkdir -p resources

      - name: Zip Plugin
        run: |
          # Use -r for recursive and -j to junk paths if needed, but here we want the structure.
          # We use || true to ensure the build continues even if zip warns about empty dirs.
          zip -r ViaStitching.zip plugins metadata.json resources || true
          ls -lh ViaStitching.zip

      - name: Generate repository.json
        run: |
          # Extract version from tag (e.g., refs/tags/v1.0.0 -> 1.0.0)
          # Use a more robust way to handle the tag name
          TAG_NAME=$(git describe --tags --abbrev=0)
          VERSION=${TAG_NAME#v}
          echo "Version extracted: $VERSION"
          echo "{
            \"plugins\": [
              {
                \"identifier\": \"com.github.jsreynaud.viastitching\",
                \"name\": \"ViaStitching\",
                \"version\": \"$VERSION\",
                \"download_url\": \"https://github.com/${{ github.repository }}/releases/download/v$VERSION/ViaStitching.zip\"
              }
            ]
          }" > repository.json
          ls -lh repository.json

      - name: Create Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release to avoid conflicts
          gh release delete ${{ github.ref_name }} --yes || true
          
          # Create new release and upload assets
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release for version ${{ github.ref_name }}. Fixed KiCAD 10 compatibility and translated interface to Chinese." \
            ViaStitching.zip repository.json
