name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip Plugin
        run: |
          # We only need the plugins folder and metadata.json
          # Resources are already inside the plugins folder
          zip -r ViaStitching.zip plugins metadata.json || true

      - name: Generate packages.json
        run: |
          VERSION=$(echo ${GITHUB_REF#refs/tags/} | sed 's/^v//')
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION/ViaStitching.zip"
          SIZE=$(stat -c%s "ViaStitching.zip")
          SHA=$(sha256sum "ViaStitching.zip" | cut -d' ' -f1)
          
          sed -e "s/{{VERSION}}/$VERSION/g" \
              -e "s|{{DOWNLOAD_URL}}|$DOWNLOAD_URL|g" \
              -e "s/{{SHA256}}/$SHA/g" \
              -e "s/{{SIZE}}/$SIZE/g" \
              packages.json.template > packages.json

      - name: Create Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ github.ref_name }} --yes || true
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release for version ${{ github.ref_name }}. Fixed KiCAD 10 compatibility and translated interface to Chinese." \
            ViaStitching.zip packages.json
